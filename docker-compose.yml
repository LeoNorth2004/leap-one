# ============================================================
# 网络配置
# ============================================================

networks:
  leapone-network:
    driver: bridge
    name: leapone-network

# ============================================================
# 数据卷 - 持久化存储
# ============================================================

volumes:
  pg_user_data:
    name: leapone-pg-user-data
  pg_portfolio_data:
    name: leapone-pg-portfolio-data
  pg_project_data:
    name: leapone-pg-project-data
  pg_task_data:
    name: leapone-pg-task-data
  pg_requirement_data:
    name: leapone-pg-requirement-data
  pg_quality_data:
    name: leapone-pg-quality-data
  pg_devops_data:
    name: leapone-pg-devops-data
  pg_document_data:
    name: leapone-pg-document-data
  pg_kanban_data:
    name: leapone-pg-kanban-data
  pg_bi_data:
    name: leapone-pg-bi-data
  pg_ai_data:
    name: leapone-pg-ai-data
  pg_notification_data:
    name: leapone-pg-notification-data
  pg_search_data:
    name: leapone-pg-search-data
  pg_config_data:
    name: leapone-pg-config-data
  redis_data:
    name: leapone-redis-data
  nginx_logs:
    name: leapone-nginx-logs
