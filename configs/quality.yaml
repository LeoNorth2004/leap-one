# ============================================================
# Leap One - 质量管理服务配置
# ============================================================

server:
  host: "0.0.0.0"
  port: 8006
  mode: "debug"
  name: "service-quality"

database:
  host: "postgres-quality"
  port: 5432
  name: "quality_db"
  user: "leapone"
  password: "${DB_PASSWORD}"
  max_open_conns: 30
  max_idle_conns: 10
  conn_max_lifetime: "30m"

redis:
  host: "redis"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 5
  pool_size: 50

jwt:
  secret: "${JWT_SECRET}"
  expire: "24h"
  issuer: "leapone-quality"

log:
  level: "debug"
  format: "json"
  path: "./logs/quality.log"
  max_size: 100
  max_backups: 7
  max_age: 30
  compress: true

quality:
  defect_severity_levels:
    - critical   # 致命
    - major      # 严重
    - moderate   # 一般
    - minor      # 轻微
    - trivial    # 建议
  defect_statuses:
    - new
    - confirmed
    - in_progress
    - resolved
    - closed
    - reopened
  test_case_max_steps: 100
  auto_defect_assignment: true
  quality_gate_enabled: true
