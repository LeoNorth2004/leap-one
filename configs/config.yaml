# ============================================================
# Leap One - 配置中心服务配置
# ============================================================

server:
  host: "0.0.0.0"
  port: 8014
  mode: "debug"
  name: "service-config"

database:
  host: "postgres-config"
  port: 5432
  name: "config_db"
  user: "leapone"
  password: "${DB_PASSWORD}"
  max_open_conns: 15
  max_idle_conns: 5
  conn_max_lifetime: "30m"

redis:
  host: "redis"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 13
  pool_size: 20

jwt:
  secret: "${JWT_SECRET}"
  expire: "24h"
  issuer: "leapone-config"

log:
  level: "debug"
  format: "json"
  path: "./logs/config.log"
  max_size: 100
  max_backups: 7
  max_age: 30
  compress: true

config:
  cache_enabled: true
  cache_ttl: "5m"
  versioning_enabled: true
  max_versions: 50
  change_audit_enabled: true
  feature_flags:
    cache_enabled: true
    cache_ttl: "10m"
  encryption:
    enabled: true
    algorithm: "aes-256-gcm"
  tenant_isolation: true          # 多租户配置隔离
