  postgres-config:
    image: postgres:16-alpine
    container_name: leapone-postgres-config
    ports:
      - "5445:5432"
    environment:
      POSTGRES_DB: config_db
      POSTGRES_USER: leapone
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_config_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leapone -d config_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - leapone-network

  # ============================================================
  # 基础设施 - Redis 缓存服务
  # ============================================================

  redis:
    image: redis:7.0-alpine
    container_name: leapone-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leapone-network

  # ============================================================
  # 基础设施 - Nginx 反向代理
  # ============================================================

  nginx:
    image: nginx:1.24-alpine
    container_name: leapone-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./leap-one-web/dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      gateway-service:
        condition: service_started
    networks:
      - leapone-network
    restart: unless-stopped

  # ============================================================
  # 应用服务 - API 网关
  # ============================================================

  gateway-service:
    build: ./gateway-service
    container_name: leapone-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      DB_HOST: postgres-user
      DB_PORT: 5432
      DB_NAME: user_db
      DB_USER: leapone
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_PORT: 8080
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leapone-network
    restart: unless-stopped

  # ============================================================
