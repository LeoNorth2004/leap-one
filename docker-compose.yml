version: '3.8'

services:
  # ============================================================
  # 基础设施 - PostgreSQL 数据库集群
  # ============================================================

  postgres-user:
    image: postgres:16-alpine
    container_name: leapone-postgres-user
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: leapone
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leapone -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - leapone-network

  postgres-portfolio:
    image: postgres:16-alpine
    container_name: leapone-postgres-portfolio
